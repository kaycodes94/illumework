<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ILLUME</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js" defer></script>
</head>
<body style="cursor:auto;">

<!-- Custom Cursor -->
<div class="cursor-dot"></div>
<div class="cursor-ring"></div>

<div class="auth-page">

  <!-- Visual Panel -->
  <div class="auth-visual">
    <img src="assets/img/editorial.png" alt="ILLUME Fashion" 
         style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover;">
    <div class="auth-visual__overlay" style="background:linear-gradient(135deg, rgba(82,23,124,0.4) 0%, rgba(1,1,3,0.9) 100%);"></div>
    <div class="auth-visual__content">
      <span class="auth-visual__logo" style="background:linear-gradient(135deg, var(--gold), var(--gold-bright)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">ILLUME</span>
      <p class="auth-visual__quote">
        "crafted in light, radiance you can wear"
        <br><span style="font-size:0.85rem; color:rgba(255,255,255,0.7); font-style:normal; margin-top:0.5rem; display:block; font-family:var(--font-body);">— Olewuezi Ikedichukwu Peace</span>
      </p>
    </div>
  </div>

  <!-- Form Panel -->
  <div class="auth-form-panel">
    <div class="auth-form-wrap">
      <a href="index.html" class="auth-logo">ILLUME</a>
      <p class="auth-tagline">Fashion. Elevated.</p>

      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your ILLUME portal to continue.</p>

      <form action="dashboard.html" id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            value=""
            placeholder="your@email.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Toggle password">
              <i data-lucide="eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn--primary btn--w-full" style="margin-top:0.5rem; padding:0.85rem;">
          <i data-lucide="log-in"></i>
          Sign In
        </button>
      </form>

      <div style="margin-top:2rem; text-align:center;">
        <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:0.5rem;">Don't have an account?</p>
        <a href="register.html" class="btn btn--secondary btn--w-full" style="padding:0.75rem;">
          <i data-lucide="user-plus"></i> Create Account
        </a>
      </div>

      <a href="index.html" class="auth-back">
        <i data-lucide="arrow-left"></i>
        Back to ILLUME
      </a>

    </div>
  </div>

</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="assets/js/main.js"></script>
<script>
  // Password toggle
  const toggle = document.getElementById('pw-toggle');
  const pwField = document.getElementById('password');
  toggle?.addEventListener('click', () => {
    const isText = pwField.type === 'text';
    pwField.type = isText ? 'password' : 'text';
    toggle.innerHTML = isText
      ? '<i data-lucide="eye"></i>'
      : '<i data-lucide="eye-off"></i>';
    if (typeof lucide !== 'undefined') lucide.createIcons();
  });
</script>
</body>
</html>
